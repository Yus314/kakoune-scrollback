name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.archive_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive_name: linux-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_name: macos-aarch64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Build
        run: cargo build --release
      - name: Create archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="kakoune-scrollback-${TAG}-${{ matrix.archive_name }}.tar.gz"
          tar czf "${ARCHIVE}" \
            -C target/release kakoune-scrollback \
            -C "${GITHUB_WORKSPACE}" rc/kakoune-scrollback.kak rc/tmux.conf LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"
